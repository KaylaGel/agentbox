name: demo
services:
  llm-proxy:
    image: ghcr.io/berriai/litellm:main-stable
    networks:
    - agentbox_internal
    - agentbox_egress
    volumes:
    - type: bind
      source: .agentbox/litellm.yaml
      target: /app/config.yaml
      read_only: true
    command:
    - --config
    - /app/config.yaml
    - --port
    - '4000'
    restart: unless-stopped
    labels:
      agentbox.project: demo
      agentbox.role: llm-proxy
  mcp-gateway:
    image: docker/mcp-gateway:latest
    networks:
    - agentbox_internal
    - agentbox_egress
    command:
    - --transport=sse
    - --port=8811
    - --servers=duckduckgo
    restart: unless-stopped
    labels:
      agentbox.project: demo
      agentbox.role: mcp-gateway
    volumes:
    - type: bind
      source: /var/run/docker.sock
      target: /var/run/docker.sock
  agent-worker:
    image: python:3.12-slim
    networks:
    - agentbox_internal
    volumes:
    - type: bind
      source: ./workspace
      target: /workspace
      read_only: false
    working_dir: /workspace
    environment:
      OPENAI_BASE_URL: http://llm-proxy:4000/v1
      OPENAI_API_KEY: sk-agentbox-W8XjGHRdiLWzx20MhpL8LIaZdkPrKYV0
      AGENT_MODEL: agent-model
      MCP_GATEWAY_URL: http://mcp-gateway:8811/sse
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
    pids_limit: 256
    restart: 'no'
    labels:
      agentbox.project: demo
      agentbox.agent: worker
      agentbox.ttl_minutes: '30'
    depends_on:
    - llm-proxy
    - mcp-gateway
    command:
    - python
    - -c
    - print('hello from an isolated agent')
    user: 10001:10001
    read_only: true
    tmpfs:
    - /tmp:size=100m
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
networks:
  agentbox_internal:
    internal: true
  agentbox_egress: {}
